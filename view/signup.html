<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep | Sign up</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    </style>
</head>
<body>
    <div class="bg-gray-100 min-h-screen flex items-center justify-center animate__animated animate__fadeIn select-none">
        <div class="px-8 w-full min-h-screen md:min-h-0 md:h-auto md:w-[420px] bg-white md:rounded-xl md:border md:border-gray-200 md:shadow-xl">
            <div class="flex flex-col justify-center min-h-screen md:min-h-0 md:h-auto md:py-12 space-y-6">

                <!-- Logo -->
                <div class="flex justify-center items-center gap-2">
                    <i class="ri-upload-cloud-line text-3xl text-violet-600"></i>
                    <h1 class="text-2xl font-semibold tracking-tight">Cloud<span class="text-violet-600">Keep</span></h1>
                </div>

                <p class="text-center text-sm text-gray-400 -mt-2">Create your account</p>

                <form class="flex flex-col gap-5" onsubmit="signup(event)">

                    <!-- Full name -->
                    <div class="space-y-1.5">
                        <label for="fullname" class="text-sm font-medium text-gray-700 block">
                            Full name
                        </label>
                        <input
                            type="text"
                            name="fullname"
                            id="fullname"
                            class="border border-gray-200 rounded-lg px-3 py-2.5 w-full text-sm text-gray-900 bg-gray-50 transition"
                            required
                            placeholder="John Doe"
                        />
                    </div>

                    <!-- Mobile -->
                    <div class="space-y-1.5">
                        <label for="mobile" class="text-sm font-medium text-gray-700 block">
                            Mobile
                        </label>
                        <input
                            type="tel"
                            name="mobile"
                            id="mobile"
                            class="border border-gray-200 rounded-lg px-3 py-2.5 w-full text-sm text-gray-900 bg-gray-50 transition"
                            required
                            placeholder="+91 00000 00000"
                            maxlength="13"
                            oninput="this.value=this.value.replace(/[^0-9+]/g, '')"
                        />
                    </div>

                    <!-- Email -->
                    <div class="space-y-1.5">
                        <label for="email" class="text-sm font-medium text-gray-700 block">
                            Email address
                        </label>
                        <input
                            type="email"
                            name="email"
                            id="email"
                            class="border border-gray-200 rounded-lg px-3 py-2.5 w-full text-sm text-gray-900 bg-gray-50 transition"
                            required
                            placeholder="you@example.com"
                        />
                    </div>

                    <!-- Password -->
                    <div class="space-y-1.5">
                        <label for="password" class="text-sm font-medium text-gray-700 block">
                            Password
                        </label>
                        <div class="relative">
                            <input
                                type="password"
                                name="password"
                                id="password"
                                class="border border-gray-200 rounded-lg px-3 py-2.5 w-full text-sm text-gray-900 bg-gray-50 transition"
                                required
                                placeholder="••••••••"
                            />
                            <button
                                onclick="togglePassword(this)"
                                type="button"
                                class="absolute right-3 top-1/2 -translate-y-1/2 h-7 w-7 flex items-center justify-center hover:bg-gray-100 rounded-full transition text-gray-400">
                                <i class="ri-eye-line text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="bg-violet-600 rounded-lg py-2.5 w-full text-white text-sm font-medium hover:bg-violet-700 active:scale-[0.99] transition mt-1">
                        Create account
                    </button>

                </form>

                <div class="flex justify-center gap-1.5">
                    <p class="text-sm text-gray-400">Already have an account?</p>
                    <a href="/login" class="text-sm text-violet-600 font-medium hover:text-violet-700">Sign in</a>
                </div>

            </div>
        </div>
    </div>

    <script src="./js/session.js"></script>
    <script src="./js/loader.js"></script>
    <script src="./js/togglePassword.js"></script>
    <script src="./js/signup.js"></script>
</body>
</html>
