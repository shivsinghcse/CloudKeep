<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep</title>
    <link rel="shortcut icon" href="./images/cloud.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
</head>
<body>
    <div class="bg-gray-200 min-h-screen flex items-center justify-center animate__animated animate_fadeIn">
        <div class="px-8 py-12 w-[420px] bg-white rounded-lg space-y-6 animate__animated animate__pulse">

            <div class="flex justify-center items-center gap-2">
                <i class="ri-upload-cloud-line text-5xl text-violet-600"></i>
                <h1 class="text-3xl font-semibold">Cloud<span class="text-violet-600">Keep</span></h1>
            </div>

            <form class="flex flex-col gap-6" onsubmit="login(event)">

                <div class="space-y-1">
                    <label 
                        for="email"
                        class="text-[17px] text-gray-500 block"
                    >
                        Email
                    </label>
                    <input 
                        type="email"
                        name="email"
                        id="email"
                        class="border border-gray-300 rounded p-2 w-full"
                        required
                        placeholder="user@email.com"
                    />
                </div>

                <div class="space-y-1">
                    <label 
                        for="password"
                        class="text-[17px] text-gray-500 block"
                    >
                        Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password"
                            name="password"
                            id="password"
                            class="border border-gray-300 rounded p-2 w-full"
                            required
                            placeholder="********"
                        />
                        <button 
                            onclick="togglePassword()"
                            type="button" 
                            class="absolute right-4 top-1  h-8 w-8 hover:bg-gray-200 hover:cursor-pointer rounded-full transition">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <button class="bg-violet-500 rounded p-2 w-full text-white font-medium hover:bg-violet-600">Sign in</button>

            </form>

            <div class="flex justify-center gap-2">
                <p class="text-gray-500">Don't have an account ?</p>
                <a href="./signup.html" class="text-green-500 font-medium">Signup</a>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
