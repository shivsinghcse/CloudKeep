<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — CloudKeep</title>
    <link rel="shortcut icon" href="./images/cloud.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #fafaf9;
            color: #0f0e17;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .logo {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; margin-bottom: 48px;
        }
        .logo-icon {
            width: 32px; height: 32px; background: #5b21b6;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon i { color: white; font-size: 16px; }
        .logo-text { font-size: 17px; font-weight: 500; color: #0f0e17; letter-spacing: -0.3px; }
        .logo-text span { color: #7c3aed; }

        .num {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(96px, 20vw, 160px);
            font-weight: 400;
            line-height: 1;
            color: #ede9fe;
            letter-spacing: -4px;
            margin-bottom: 8px;
            animation: fadeUp .5s ease both;
        }

        .icon-wrap {
            width: 64px; height: 64px; border-radius: 16px;
            background: #ede9fe;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            animation: fadeUp .5s .1s ease both;
        }
        .icon-wrap i { font-size: 28px; color: #7c3aed; }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 400;
            color: #0f0e17;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            animation: fadeUp .5s .15s ease both;
        }

        p {
            font-size: 15px; font-weight: 300;
            color: #4a4a5a; max-width: 360px;
            line-height: 1.65; margin-bottom: 36px;
            animation: fadeUp .5s .2s ease both;
        }

        .actions {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap; justify-content: center;
            animation: fadeUp .5s .25s ease both;
        }

        .btn-primary {
            padding: 11px 24px; border-radius: 9px;
            font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
            color: white; background: #5b21b6; border: none;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 7px;
            transition: background .2s, transform .15s;
        }
        .btn-primary:hover { background: #7c3aed; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.98); }

        .btn-ghost {
            padding: 11px 24px; border-radius: 9px;
            font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
            color: #4a4a5a; background: white;
            border: 1px solid #e8e6f0; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
            transition: border-color .2s, color .2s, transform .15s;
        }
        .btn-ghost:hover { border-color: #7c3aed; color: #7c3aed; transform: translateY(-1px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="/" class="logo">
        <div class="logo-icon"><i class="ri-upload-cloud-line"></i></div>
        <span class="logo-text">Cloud<span>Keep</span></span>
    </a>

    <div class="num">404</div>

    <div class="icon-wrap">
        <i class="ri-file-search-line"></i>
    </div>

    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

    <div class="actions">
        <a href="/" class="btn-primary">
            <i class="ri-home-4-line"></i>
            Go home
        </a>
        <a href="/pages/dashboard" class="btn-ghost">
            <i class="ri-apps-line"></i>
            Dashboard
        </a>
    </div>

</body>
</html>
