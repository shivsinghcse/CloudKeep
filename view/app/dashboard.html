<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep | Dashboard</title>
    <link rel="shortcut icon" href="../images/cloud.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/preGaurd.js"></script>

</head>
<body>
    <div class="bg-gray-100 h-screen">
        <!-- <aside 
            class="fixed top-18 md:top-0 left-0 h-full w-64 bg-gradient-to-r from-cyan-500 to-blue-500 
            transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 space-y-6"
            id="sidebar"
        >

            </div>

                        <i class="ri-apps-line"></i>
                        <label>Dashboard</label>
                    </button>
                </a>

                <a href="files">
                    <button class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-file-line"></i>
                        <label>My Files</label>
                    </button>
                </a>

                <a href="history">
                    <button class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-file-history-line"></i>
                        <label>History</label>
                    </button>
                </a>

                <button onclick="logout()" class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-logout-circle-r-line"></i>
                        <label>Logout</label>
                </button>

        </aside>
 -->

        <aside 
            class="fixed top-18 md:top-0 left-0 h-full w-64 
            bg-gradient-to-b from-[#1e1b4b] via-[#312e81] to-[#1e1b4b]
            transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 space-y-6
            shadow-2xl shadow-indigo-950/50 border-r border-indigo-800/30"
            id="sidebar"
        >
            <!-- Profile Section -->
            <div class="flex flex-col items-center mt-8 pb-6 mx-4 border-b border-indigo-700/30">
                <div class="relative mb-3">
                    <div class="w-20 h-20 rounded-2xl ring-2 ring-indigo-400/40 ring-offset-2 ring-offset-[#312e81] overflow-hidden shadow-lg">
                        <img src="../images/avt.png" width="80" id="userImage" class="w-full h-full object-cover"/>
                    </div>
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-[#312e81]"></span>
                </div>
                <h1 class="text-base font-semibold text-white capitalize mt-1" id="userName">Amelia Harper</h1>
                <p class="text-xs text-indigo-300/80 mt-0.5" id="userEmail">amelia@harper.com</p>
            </div>

            <!-- Nav Links -->
            <div class="px-4 flex flex-col gap-1.5">

                <p class="text-[10px] font-semibold uppercase tracking-widest text-indigo-400/50 px-3 mb-1">Menu</p>

                <a href="dashboard">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-apps-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">Dashboard</span>
                    </button>
                </a>

                <a href="files">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">My Files</span>
                    </button>
                </a>

                <a href="history">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-history-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">History</span>
                    </button>
                </a>

                <div class="mt-4 pt-4 border-t border-indigo-700/30">
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-rose-300/80 hover:text-rose-200
                        hover:bg-rose-500/10 active:bg-rose-500/20
                        transition-all duration-200 group">
                        <i class="ri-logout-circle-r-line text-lg text-rose-400/70 group-hover:text-rose-300 transition-colors"></i>
                        <span class="text-sm font-medium">Logout</span>
                    </button>
                </div>

            </div>
        </aside>

        <section class="md:ml-64 transition-all duration-300" id="section">
            <nav class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center">
                <div class="flex items-center gap-1 select-none cursor-pointer">
                    <i class="ri-upload-cloud-line text-4xl text-violet-600"></i>
                    <h1 class="text-2xl font-semibold">Cloud<span class="text-violet-600">Keep</span></h1>
                </div>

                <div class="space-x-2">
                    <button onclick="logout()" title="Logout" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-logout-circle-r-line"></i>
                    </button>

                    <button onclick="toggleSidebar()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-menu-2-line"></i>
                    </button>
                </div>
            </nav>

            <div id="dashboard" class="p-6 space-y-4 ">
                <h1 class="text-lg font-medium select-none">Dashboard</h1>
                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer flex flex-col items-center justify-center gap-1 py-6 md:py-12 border border-gray-200 select-none">
                        <h1 class="text-xl font-semibold text-gray-600 ml-5 md:ml-0">Video</h1>
                        <p class="text-xl md:text-4xl font-bold ml-5 md:ml-0">26150</p>
                        <div
                            class="flex justify-center items-center w-16 md:w-25 h-16 md:h-25 rounded-full absolute -left-4 md:-left-5"
                            style="background-image: linear-gradient(to top, #ff0844 0%, #ffb199 100%);"
                        >
                            <i class="ri-live-line text-4xl text-white"></i>
                        </div>
                    </div>

                    <div class="overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer flex flex-col items-center justify-center gap-1 py-6 md:py-12 border border-gray-200 select-none">
                        <h1 class="text-xl font-semibold text-gray-600 ml-5 md:ml-0">Audio</h1>
                        <p class="text-xl md:text-4xl font-bold ml-5 md:ml-0">6150</p>
                        <div
                            class="flex justify-center items-center w-16 md:w-25 h-16 md:h-25 rounded-full absolute -left-4 md:-left-5"
                            style="background-image: linear-gradient(to top, #30cfd0 0%, #330867 100%);"
                        >
                            <i class="ri-folder-music-line text-4xl text-white"></i>
                        </div>
                    </div>

                    <div class="overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer flex flex-col items-center justify-center gap-1 py-6 md:py-12 border border-gray-200 select-none">
                        <h1 class="text-xl font-semibold text-gray-600 ml-5 md:ml-0">PDF</h1>
                        <p class="text-xl md:text-4xl font-bold ml-5 md:ml-0">16150</p>
                        <div
                            class="flex justify-center items-center w-16 md:w-25 h-16 md:h-25 rounded-full absolute -left-4 md:-left-5"
                            style="background-image: linear-gradient(to right, #f83600 0%, #f9d423 100%);"
                        >
                            <i class="ri-file-pdf-2-line text-4xl text-white"></i>
                        </div>
                    </div>

                    <div class="overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer flex flex-col items-center justify-center gap-1 py-6 md:py-12 border border-gray-200 select-none">
                        <h1 class="text-xl font-semibold text-gray-600 ml-5 md:ml-0">Image</h1>
                        <p class="text-xl md:text-4xl font-bold ml-5 md:ml-0">21650</p>
                        <div
                            class="flex justify-center items-center w-16 md:w-25 h-16 md:h-25 rounded-full absolute -left-4 md:-left-5"
                            style="background-image: linear-gradient(to right, #b8cbb8 0%, #b8cbb8 0%, #b465da 0%, #cf6cc9 33%, #ee609c 66%, #ee609c 100%);"
                        >
                            <i class="ri-file-image-line text-4xl text-white"></i>
                        </div>
                    </div>

                    <div class="col-span-2 overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer p-6 select-none">
                        <h1 class="text-xl font-semibold text-gray-600">Recent Files</h1>
                    </div>

                    <div class="col-span-2 overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg hover:cursor-pointer p-6 select-none">
                        <h1 class="text-xl font-semibold text-gray-600">Recent Shared</h1>
                    </div>

                </div>
         
            </div>
        </section>
    </div>

    <script src="../js/layout.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
