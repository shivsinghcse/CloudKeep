<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep | Files</title>
    <link rel="shortcut icon" href="../images/cloud.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../js/session.js"></script>
    <script src="../js/preGaurd.js"></script>
</head>
<body>
    <div class="bg-gray-100 h-screen">
          <aside 
            class="fixed top-18 md:top-0 left-0 h-full w-64 
            bg-gradient-to-b from-[#1e1b4b] via-[#312e81] to-[#1e1b4b]
            transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 space-y-6
            shadow-2xl shadow-indigo-950/50 border-r border-indigo-800/30"
            id="sidebar"
        >
            <!-- Profile Section -->
            <div class="flex flex-col items-center mt-8 pb-6 mx-4 border-b border-indigo-700/30">
                <div class="relative mb-3">
                    <div class="w-20 h-20 rounded-2xl ring-2 ring-indigo-400/40 ring-offset-2 ring-offset-[#312e81] overflow-hidden shadow-lg">
                        <img src="../images/avt.png" width="80" id="userImage" class="w-full h-full object-cover"/>
                    </div>
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-[#312e81]"></span>
                </div>
                <h1 class="text-base font-semibold text-white capitalize mt-1" id="userName">Amelia Harper</h1>
                <p class="text-xs text-indigo-300/80 mt-0.5" id="userEmail">amelia@harper.com</p>
            </div>

            <!-- Nav Links -->
            <div class="px-4 flex flex-col gap-1.5">

                <p class="text-[10px] font-semibold uppercase tracking-widest text-indigo-400/50 px-3 mb-1">Menu</p>

                <a href="dashboard">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-apps-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">Dashboard</span>
                    </button>
                </a>

                <a href="files">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">My Files</span>
                    </button>
                </a>

                <a href="history">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-history-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">History</span>
                    </button>
                </a>

                <div class="mt-4 pt-4 border-t border-indigo-700/30">
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-rose-300/80 hover:text-rose-200
                        hover:bg-rose-500/10 active:bg-rose-500/20
                        transition-all duration-200 group">
                        <i class="ri-logout-circle-r-line text-lg text-rose-400/70 group-hover:text-rose-300 transition-colors"></i>
                        <span class="text-sm font-medium">Logout</span>
                    </button>
                </div>

            </div>
        </aside>


        <section class="md:ml-64 transition-all duration-300" id="section">
            <nav class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center">
                <div class="flex items-center gap-1 select-none cursor-pointer">
                    <i class="ri-upload-cloud-line text-4xl text-violet-600"></i>
                    <h1 class="text-2xl font-semibold">Cloud<span class="text-violet-600">Keep</span></h1>
                </div>

                <div class="space-x-2">
                    <button onclick="logout()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-logout-circle-r-line"></i>
                    </button>

                    <button onclick="toggleSidebar()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-menu-2-line"></i>
                    </button>
                </div>
            </nav>

            <div class="p-6 space-y-4 ">
                <div class="flex justify-between items-center">
                    <h1 class="text-lg font-medium select-none">My Files</h1>
                    <button class="select-none bg-violet-500 hover:bg-violet-600 text-white py-2 px-4 rounded" onclick="toggleDrawer()">
                        <i class="ri-add-line"></i>
                        <label>Add File</label>
                    </button>
                </div>
                <div class="hidden md:block w-full overflow-x-auto">
                    <table class="w-full min-w-175 bg-white">
                    <tr class="bg-slate-900 text-slate-200 text-left">
                        <th class="font-medium py-2 pl-6">Filename</th>
                        <th class="font-medium">Type</th>
                        <th class="font-medium">Size</th>
                        <th class="font-medium">Created</th>
                        <th class="font-medium">Action</th>
                    </tr>

                    <tbody id="tbody">
                    </tbody>
                 </table>
                </div>
                <div id="cardContainer" class="md:hidden space-y-4">
                </div>
            </div>
        </section>

        <div 
            class="fixed top-[73px] md:top-0 right-0 w-full md:w-4/12 bg-white shadow-lg p-6 space-y-6 h-full transform translate-x-full transition-transform duration-300 z-50 select-none" 
            id="drawer"
        >
            <div class="flex justify-between items-center">
                <h1 class="text-lg font-medium text-gray-600">Adding a new file</h1>
                <button onclick="toggleDrawer()">
                    <i class="ri-close-circle-fill hover:text-rose-600 text-xl"></i>
                </button>
            </div>
            <div class="h-px bg-gray-200 -mx-6"></div>
            <form class="space-y-6" onsubmit="uploadFile(event)">
                <div class="flex flex-col gap-2">
                    <label class="text-gray-600 font-medium">Filename</label>
                    <input
                         class="py-2 px-3 border border-gray-300 rounded" name="filename" placeholder="Enter filename"
                         required
                    />
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-gray-600 font-medium">Choose a file</label>
                    <input
                        type="file"
                        name="myFile"
                        class="py-2 px-3 border border-gray-300 rounded" placeholder="Enter filename"
                        required
                    />
                </div>

                <button id="upload-btn" class="py-2 px-6 bg-rose-400 hover:bg-rose-500 text-white rounded font-medium cursor-pointer">UPLOAD NOW</button>
            </form>

            <div class="bg-gray-100 h-4 rounded-lg">
                <div class="h-full rounded-lg bg-green-600 text-xs text-white text-center" id="progressbar" style="width: 0;">
                    
                </div>
            </div>
        </div>
    </div>

    <script src="../js/env.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/myFiles.js"></script>
</body>
</html>
