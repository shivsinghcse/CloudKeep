<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — CloudKeep</title>
    <link rel="shortcut icon" href="./images/cloud.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .serif { font-family: 'Instrument Serif', serif; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-1 { animation: fadeUp .5s ease both; }
        .fade-2 { animation: fadeUp .5s .1s ease both; }
        .fade-3 { animation: fadeUp .5s .15s ease both; }
        .fade-4 { animation: fadeUp .5s .2s ease both; }
        .fade-5 { animation: fadeUp .5s .25s ease both; }
    </style>
</head>
<body class="bg-[#fafaf9] text-[#0f0e17] min-h-screen flex flex-col items-center justify-center px-6 text-center">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2 no-underline mb-12">
        <div class="w-8 h-8 bg-violet-800 rounded-lg flex items-center justify-center">
            <i class="ri-upload-cloud-line text-white text-base"></i>
        </div>
        <span class="text-[17px] font-medium text-[#0f0e17] tracking-tight">Cloud<span class="text-violet-600">Keep</span></span>
    </a>

    <!-- 404 number -->
    <div class="fade-1 serif text-[clamp(96px,20vw,160px)] font-normal leading-none text-violet-100 tracking-[-4px] mb-2">
        404
    </div>

    <!-- Icon -->
    <div class="fade-2 w-16 h-16 rounded-2xl bg-violet-100 flex items-center justify-center mx-auto mb-6">
        <i class="ri-file-search-line text-[28px] text-violet-600"></i>
    </div>

    <!-- Heading -->
    <h1 class="fade-3 serif text-[clamp(24px,4vw,36px)] font-normal text-[#0f0e17] tracking-[-0.5px] mb-3">
        Page not found
    </h1>

    <!-- Description -->
    <p class="fade-4 text-[15px] font-light text-[#4a4a5a] max-w-[360px] leading-[1.65] mb-9">
        The page you're looking for doesn't exist or may have been moved. Let's get you back on track.
    </p>

    <!-- Actions -->
    <div class="fade-5 flex items-center gap-2.5 flex-wrap justify-center">
        <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-[9px] text-sm font-medium text-white bg-violet-800 hover:bg-violet-600 hover:-translate-y-px active:scale-[0.98] transition-all no-underline">
            <i class="ri-home-4-line"></i>
            Go home
        </a>
        <a href="/dashboard" class="inline-flex items-center gap-2 px-6 py-3 rounded-[9px] text-sm font-medium text-[#4a4a5a] bg-white border border-[#e8e6f0] hover:border-violet-600 hover:text-violet-600 hover:-translate-y-px transition-all no-underline">
            <i class="ri-apps-line"></i>
            Dashboard
        </a>
    </div>

</body>
</html>
