<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep | History</title>
    <link rel="shortcut icon" href="../images/cloud.png" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/preGaurd.js"></script>
</head>
<body>
    <div class="bg-gray-100 h-screen">
        <aside 
            class="fixed top-18 md:top-0 left-0 h-full w-64 bg-gradient-to-r from-cyan-500 to-blue-500 
            transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-50 space-y-6"
            id="sidebar"
        >
            <div class="flex flex-col items-center">
                <img src="../images/avt.png"  width="80" id="userImage"/>
                <h1 class="text-lg font-medium text-white capitalize" id="userName">Amelia Harper</h1>
                <p class="text-sm text-gray-100" id="userEmail">amelia@harper.com</p>
            </div>

            <div class="px-6 flex flex-col gap-4">
                <a href="dashboard">
                    <button class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-apps-line"></i>
                        <label>Dashboard</label>
                    </button>
                </a>

                <a href="files">
                    <button class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-file-line"></i>
                        <label>My Files</label>
                    </button>
                </a>

                <a href="history">
                    <button class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-file-history-line"></i>
                        <label>History</label>
                    </button>
                </a>

                <button onclick="logout()" class="w-full bg-rose-400 text-white py-2.5 rounded hover:bg-rose-600">
                        <i class="ri-logout-circle-r-line"></i>
                        <label>Logout</label>
                </button>

            </div>
        </aside>


        <section class="md:ml-64 transition-all duration-300" id="section">
            <nav class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center">
                <div class="flex items-center gap-1 select-none">
                    <i class="ri-upload-cloud-line text-4xl text-violet-600"></i>
                    <h1 class="text-2xl font-semibold">Cloud<span class="text-violet-600">Keep</span></h1>
                </div>

                <div class="space-x-2">
                    <button onclick="logout()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-logout-circle-r-line"></i>
                    </button>

                    <button onclick="toggleSidebar()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-menu-2-line"></i>
                    </button>
                </div>
            </nav>

            <div class="p-6 space-y-4 select-none">
                <div class="flex justify-between items-center">
                    <h1 class="text-lg font-medium">History</h1>
                </div>
                
                 <div class="hidden md:block w-full overflow-x-auto">
                    <table class="w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
                        <thead>
                            <tr class="bg-slate-900 text-slate-200 text-left">
                                <th class="font-medium py-3 px-4">Filename</th>
                                <th class="font-medium px-4">Email</th>
                                <th class="font-medium px-4">Datetime</th>
                                <th class="font-medium px-4">Action</th>
                            </tr>
                        </thead>

                        <tbody id="historyTable">
                            <!-- dynamic rows -->
                             <tr class="text-gray-500 border-b border-gray-100">
                                <td class="py-4 pl-6">Introduction to HTML</td>
                                <td>singhshiv0204@gmail.com</td>
                                <td>24 June 2025</td>
                                <td>
                                    <div class="space-x-2">
                                        <button class="bg-rose-400 hover:bg-rose-600 text-white rounded hover:cursor-pointer px-2 py-1">
                                            <i class="ri-delete-bin-4-line"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="historyCards" class="md:hidden space-y-4">
                    <!-- dynamic cards -->
                     <div class="bg-white rounded-lg shadow p-4 space-y-3 border border-gray-200">
    
                        <div class="flex justify-between items-start">
                            <h1 class="font-medium text-gray-700 capitalize">Introduction to HTML</h1>
                            <span class="text-xs bg-gray-100 px-2 py-1 rounded">Shared</span>
                        </div>

                        <p class="text-sm text-gray-500 break-all">
                            singhshiv0204@gmail.com
                        </p>

                        <div class="flex justify-between text-sm text-gray-400">
                            <span>24 June 2025</span>
                        </div>

                        <div class="flex justify-end pt-2 border-t border-gray-300">
                            <button class="bg-rose-400 hover:bg-rose-600 text-white rounded px-3 py-1">
                                <i class="ri-delete-bin-4-line"></i>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../js/layout.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
