<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep | History</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <script src="../js/session.js"></script>
    <script src="../js/preGaurd.js"></script>
</head>
<body>
    <div class="bg-gray-100 h-screen select-none">
        <aside 
        class="fixed top-18 md:top-0 left-0 h-full w-60 
        bg-gradient-to-b from-[#1e1b4b] via-[#312e81] to-[#1e1b4b]
        transform -translate-x-full z-50 space-y-6
        shadow-2xl shadow-indigo-950/50 border-r border-indigo-800/30"
        id="sidebar"
        >
            <div class="hidden md:block h-[73px]"></div>
            <!-- Profile Section -->
            <div class="flex flex-col items-center mt-8 pb-6 mx-4 border-b border-indigo-700/30">
                <div class="relative mb-3">
                    <div class="w-20 h-20 rounded-2xl ring-2 ring-indigo-400/40 ring-offset-2 ring-offset-[#312e81] overflow-hidden shadow-lg">
                        <img src="../images/avt.png" width="80" id="userImage" class="w-full h-full object-cover"/>
                    </div>
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-[#312e81]"></span>
                </div>
                <h1 class="text-base font-semibold text-white capitalize mt-1" id="userName">Amelia Harper</h1>
                <div class='flex gap-4'>
                    <p class="text-xs text-indigo-300/80 mt-0.5 select-none" id="userEmail">amelia@harper.com</p>
                    <button onclick="copyAdminEmail(this)" 
                        class="text-indigo-300 hover:text-white transition duration-200 hover:cursor-pointer ml-1">
                        <i class="ri-file-copy-line text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Nav Links -->
            <div class="px-4 flex flex-col gap-1.5">

                <p class="text-[10px] font-semibold uppercase tracking-widest text-indigo-400/50 px-3 mb-1 select-none">Menu</p>

                <a href="dashboard">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-apps-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">Dashboard</span>
                    </button>
                </a>

                <a href="files">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">My Files</span>
                    </button>
                </a>

                <a href="history">
                    <button class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-indigo-200 hover:text-white
                        hover:bg-white/10 active:bg-white/15
                        transition-all duration-200 group">
                        <i class="ri-file-history-line text-lg text-indigo-400 group-hover:text-indigo-200 transition-colors"></i>
                        <span class="text-sm font-medium">History</span>
                    </button>
                </a>

                <div class="mt-4 pt-4 border-t border-indigo-700/30">
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl
                        text-rose-300/80 hover:text-rose-200
                        hover:bg-rose-500/10 active:bg-rose-500/20
                        transition-all duration-200 group">
                        <i class="ri-logout-circle-r-line text-lg text-rose-400/70 group-hover:text-rose-300 transition-colors"></i>
                        <span class="text-sm font-medium">Logout</span>
                    </button>
                </div>
            </div>

            <div class="fixed left-0 bottom-2 w-58 mx-auto px-2 flex justify-center items-center gap-2 select-none">
                <img src="../images/cloud.png" alt="logo" class="w-4"/>
                <p class="text-center text-xs font-normal text-gray-400">&copy; <span id="year" class="">2027</span> CloudKeep.</p>
            </div>
        </aside>


        <section class="md:ml-60 transition-all duration-300" id="section">
            <nav class="bg-white px-6 py-4 w-full shadow-sm flex justify-between items-center">
                <a href="dashboard" class="inline-block no-undeline">
                    <div class="flex items-center gap-2 select-none cursor-pointer">
                        <i class="ri-upload-cloud-line text-3xl text-violet-600"></i>
                        <h1 class="text-2xl font-semibold tracking-tight">Cloud<span class="text-violet-600">Keep</span></h1>
                    </div>
                </a>

                <div class="space-x-2">
                    <button onclick="logout()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded md:hidden">
                        <i class="ri-logout-circle-r-line"></i>
                    </button>

                    <button onclick="toggleSidebar()" class=" bg-gray-100 px-3 p-2 hover:cursor-pointer hover:bg-gray-200 rounded">
                        <i class="ri-menu-2-line"></i>
                    </button>
                </div>
            </nav>

            <div class="p-6 space-y-4 select-none">
                <div class="flex justify-between items-center">
                    <h1 class="text-lg font-medium">History</h1>
                </div>
                
                 <div class="hidden md:block w-full overflow-x-auto">
                    <table class="w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-left border-b border-gray-200">
                                <th class="font-medium py-3 pl-6 text-xs uppercase tracking-wider">Filename</th>
                                <th class="font-medium text-xs uppercase tracking-wider">Email</th>
                                <th class="font-medium text-xs uppercase tracking-wider">Size</th>
                                <th class="font-medium text-xs uppercase tracking-wider">Date & Time</th>
                                <th class="font-medium text-xs uppercase tracking-wider">Status</th>
                            </tr>
                        </thead>

                        <tbody id="historyTable">
                            <!-- dynamic rows -->
                        </tbody>
                    </table>
                </div>
                <div id="historyCards" class="md:hidden space-y-4">
                    <!-- dynamic cards -->
                </div>
            </div>
        </section>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
